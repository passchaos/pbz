syntax = "proto3";
package demo;
option go_package = "github.com/pbz/bench/personpb";

message Person {
  int32 id = 1;
  string name = 2;
  repeated int32 scores = 3;
  map<string, int32> counts = 4;
}


enum BenchKind {
  BENCH_KIND_UNKNOWN = 0;
  BENCH_KIND_ALPHA = 1;
  BENCH_KIND_BETA = 2;
}

message ScalarMix {
  bool active = 1;
  uint32 count = 2;
  uint64 total = 3;
  sint32 delta = 4;
  sint64 big_delta = 5;
  fixed32 checksum = 6;
  fixed64 token = 7;
  sfixed32 signed_fixed = 8;
  sfixed64 signed_big_fixed = 9;
  float ratio = 10;
  double score = 11;
  BenchKind kind = 12;
  repeated bool flags = 13;
  repeated uint64 ids = 14;
}

message TextBytes {
  string title = 1;
  bytes payload = 2;
  repeated string tags = 3;
  repeated bytes chunks = 4;
}

message Packed {
  repeated int32 values = 1;
}

message FixedPacked {
  repeated fixed32 values = 1;
}

message Fixed64Packed {
  repeated fixed64 values = 1;
}

message SFixedPacked {
  repeated sfixed32 values = 1;
}

message SFixed64Packed {
  repeated sfixed64 values = 1;
}

message FloatPacked {
  repeated float values = 1;
}

message DoublePacked {
  repeated double values = 1;
}

message UInt64Packed {
  repeated uint64 values = 1;
}

message SInt64Packed {
  repeated sint64 values = 1;
}

message BoolPacked {
  repeated bool values = 1;
}

message EnumPacked {
  repeated BenchKind values = 1;
}

message LargeMap {
  map<string, int32> counts = 1;
}

message Complex {
  message Audit {
    string actor = 1;
    int64 at_unix = 2;
  }

  int32 id = 1;
  Audit audit = 2;
  repeated Audit history = 3;
  map<string, Audit> audits = 4;

  oneof subject {
    string user_name = 5;
    bytes organization_id = 6;
    Audit audit_subject = 7;
  }
}
