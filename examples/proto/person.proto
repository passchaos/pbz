syntax = "proto3";
package demo;

message Person {
  int32 id = 1;
  string name = 2;
  repeated int32 scores = 3;
  map<string, int32> counts = 4;
}

message TextBytes {
  string title = 1;
  bytes payload = 2;
  repeated string tags = 3;
  repeated bytes chunks = 4;
}

message Packed {
  repeated int32 values = 1;
}

message FixedPacked {
  repeated fixed32 values = 1;
}

message Fixed64Packed {
  repeated fixed64 values = 1;
}

message Complex {
  message Audit {
    string actor = 1;
    int64 at_unix = 2;
  }

  int32 id = 1;
  Audit audit = 2;
  repeated Audit history = 3;
  map<string, Audit> audits = 4;

  oneof subject {
    string user_name = 5;
    bytes organization_id = 6;
    Audit audit_subject = 7;
  }
}
